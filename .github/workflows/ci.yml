name: CI

on:
  push:
    branches: [main, develop, 'claude/**']
  pull_request:
    branches: [main, develop]

# Audit G-6: GITHUB_TOKEN default keng huquqlarini deny-all qilamiz.
# Har bir job faqat o'ziga kerakli huquqni so'raydi (bu yerda hech biriga write kerak emas).
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Audit G-6: `npm ci` — lockfile bo'yicha deterministik o'rnatish (version drift yo'q).
      # Avvalgi `npm ci || npm install` fallback lockfile butunligini chetlab o'tar edi.
      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint || echo "Lint not configured yet"
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          API_BASE_URL: https://app.zerox.uz/api/v1
          SOCKET_IO_URL: https://app.zerox.uz

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test || echo "Tests not configured yet"
        continue-on-error: true
